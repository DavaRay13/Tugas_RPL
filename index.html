<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Login Keren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center font-sans overflow-hidden">

    <!-- Wadah untuk Notifikasi (Alert Kustom) -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- Halaman Utama (Login & Register) -->
    <div id="auth-container" class="glass-panel p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 transition-all duration-500 relative">
        
        <!-- Form Login -->
        <div id="login-view">
            <h2 class="text-3xl font-bold text-gray-800 text-center mb-6">Masuk Dulu Bro</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="login-username">Username</label>
                    <input class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors" type="text" id="login-username" required placeholder="Masukkan username">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="login-password">Password</label>
                    <input class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-colors" type="password" id="login-password" required placeholder="Masukkan password">
                </div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 duration-200">
                    Masuk
                </button>
            </form>
            <p class="text-center text-gray-600 mt-6 text-sm">
                Belum punya akun? 
                <button onclick="toggleView('register')" class="text-purple-600 font-bold hover:underline focus:outline-none">Daftar di sini</button>
            </p>
        </div>

        <!-- Form Register (Sembunyi by default) -->
        <div id="register-view" class="hidden">
            <h2 class="text-3xl font-bold text-gray-800 text-center mb-6">Bikin Akun Baru</h2>
            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="reg-username">Username</label>
                    <input class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-500 transition-colors" type="text" id="reg-username" required placeholder="Pilih username keren">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="reg-password">Password</label>
                    <input class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-500 transition-colors" type="password" id="reg-password" required placeholder="Bikin password yang kuat">
                </div>
                <button type="submit" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition-colors shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 duration-200">
                    Daftar Sekarang
                </button>
            </form>
            <p class="text-center text-gray-600 mt-6 text-sm">
                Udah punya akun? 
                <button onclick="toggleView('login')" class="text-pink-600 font-bold hover:underline focus:outline-none">Balik ke Login</button>
            </p>
        </div>
    </div>

    <!-- Halaman Dashboard (Setelah Login) -->
    <div id="dashboard-container" class="hidden text-center z-10 w-full px-4">
        <div class="glass-panel p-10 rounded-3xl shadow-2xl inline-block max-w-2xl mx-auto transform hover:scale-105 transition-transform duration-300">
            <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 mb-4 drop-shadow-sm">
                SELAMAT!
            </h1>
            <h2 class="text-2xl md:text-3xl font-semibold text-gray-800 mb-8" id="welcome-message">
                Berhasil login, bro!
            </h2>
            <p class="text-gray-600 mb-8 max-w-md mx-auto">
                Ini adalah halaman rahasia yang cuma bisa diakses kalau lo udah berhasil masuk. Keren kan efeknya?
            </p>
            <button onclick="logout()" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-lg hover:shadow-xl">
                Keluar (Logout)
            </button>
        </div>
    </div>

    <!-- Wadah untuk Confetti -->
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <script src="js/script.js"></script>
</body>
</html>
