<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Login Keren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans overflow-hidden">

    <!-- Ornamen Background Modern -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-slate-200/50 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-slate-200/50 blur-[120px]"></div>
    </div>

    <!-- Wadah untuk Notifikasi (Alert Kustom) -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <!-- Halaman Utama (Login & Register) -->
    <div id="auth-container" class="glass-panel p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md mx-4 transition-all duration-500 relative border border-slate-200/60">
        
        <!-- Form Login -->
        <div id="login-view">
            <h2 class="text-4xl font-black text-slate-900 text-center mb-2 tracking-tight">Selamat Datang</h2>
            <p class="text-slate-500 text-center mb-8 text-sm">Silakan masuk ke akun Anda</p>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2" for="login-username">Username</label>
                    <input class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-all" type="text" id="login-username" required placeholder="Username">
                </div>
                <div>
                    <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2" for="login-password">Password</label>
                    <input class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-all" type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-slate-200 active:scale-[0.98] duration-200">
                    Masuk Sekarang
                </button>
            </form>
            <p class="text-center text-slate-500 mt-8 text-sm">
                Belum punya akun? 
                <button onclick="toggleView('register')" class="text-slate-900 font-bold hover:underline underline-offset-4 focus:outline-none">Daftar Akun</button>
            </p>
        </div>

        <!-- Form Register (Sembunyi by default) -->
        <div id="register-view" class="hidden">
            <h2 class="text-4xl font-black text-slate-900 text-center mb-2 tracking-tight">Buat Akun</h2>
            <p class="text-slate-500 text-center mb-8 text-sm">Bergabunglah dengan komunitas kami</p>
            <form id="register-form" class="space-y-5">
                <div>
                    <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2" for="reg-username">Username</label>
                    <input class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-all" type="text" id="reg-username" required placeholder="Pilih username">
                </div>
                <div>
                    <label class="block text-slate-700 text-xs font-bold uppercase tracking-wider mb-2" for="reg-password">Password</label>
                    <input class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition-all" type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-slate-200 active:scale-[0.98] duration-200">
                    Daftar Sekarang
                </button>
            </form>
            <p class="text-center text-slate-500 mt-8 text-sm">
                Udah punya akun? 
                <button onclick="toggleView('login')" class="text-slate-900 font-bold hover:underline underline-offset-4 focus:outline-none">Kembali Login</button>
            </p>
        </div>
    </div>

    <!-- Halaman Dashboard (Setelah Login) -->
    <div id="dashboard-container" class="hidden text-center z-10 w-full px-4">
        <div class="glass-panel p-16 rounded-[3rem] shadow-2xl inline-block max-w-2xl mx-auto border border-slate-200/60">
            <h1 class="text-6xl md:text-8xl font-black text-slate-900 mb-6 tracking-tighter">
                HELLO.
            </h1>
            <h2 class="text-2xl md:text-3xl font-medium text-slate-600 mb-10" id="welcome-message">
                Berhasil login, bro!
            </h2>
            <div class="w-20 h-1 bg-slate-900 mx-auto mb-10 rounded-full"></div>
            <p class="text-slate-500 mb-10 max-w-md mx-auto leading-relaxed">
                Akses diberikan. Anda sekarang berada di area terbatas. Nikmati pengalaman modern dengan antarmuka yang bersih.
            </p>
            <button onclick="logout()" class="bg-white border-2 border-slate-900 text-slate-900 hover:bg-slate-900 hover:text-white font-bold py-4 px-12 rounded-full transition-all duration-300 shadow-lg hover:shadow-slate-200">
                Keluar Sesi
            </button>
        </div>
    </div>

    <!-- Wadah untuk Confetti -->
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <script src="js/script.js"></script>
</body>
</html>
